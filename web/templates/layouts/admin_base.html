<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-default-lang="{{.DefaultLang}}" data-app-version="{{appVersion}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
    <link rel="stylesheet" href="/static/css/admin.css">
    <script>
    (function(){
        var t = localStorage.getItem('admin-theme');
        if (t) document.documentElement.setAttribute('data-bs-theme', t);
    })();
    </script>
</head>
<body style="background: var(--admin-bg); color: #e8e8f0;">
    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="sidebar-brand">
            <i class="bxf bx-briefcase"></i> <span data-i18n="admin.sidebar.brand">Portfolio Admin</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin" class="nav-link" title="Dashboard"><i class="bx bx-tachometer"></i> <span data-i18n="admin.nav.dashboard">Dashboard</span></a>
            <a href="/admin/owner" class="nav-link" title="Owner Profile"><i class="bx bx-user-circle"></i> <span data-i18n="admin.nav.owner">Owner Profile</span></a>
            <a href="/admin/projects" class="nav-link" title="Projects"><i class="bx bx-folder-open"></i> <span data-i18n="admin.nav.projects">Projects</span></a>
            <a href="/admin/experience" class="nav-link" title="Experience"><i class="bx bx-history"></i> <span data-i18n="admin.nav.experience">Experience</span></a>
            <a href="/admin/skills" class="nav-link" title="Skills"><i class="bxf bx-star"></i> <span data-i18n="admin.nav.skills">Skills</span></a>
            <a href="/admin/tech-stacks" class="nav-link" title="Tech Stack"><i class="bx bx-layers"></i> <span data-i18n="admin.nav.tech_stacks">Tech Stack</span></a>
            <a href="/admin/social-links" class="nav-link" title="Social Links"><i class="bxf bx-share"></i> <span data-i18n="admin.nav.social_links">Social Links</span></a>
            <a href="/admin/uploads" class="nav-link" title="Uploads"><i class="bx bx-arrow-from-bottom-stroke"></i> <span data-i18n="admin.nav.uploads">Uploads</span></a>
            <a href="/admin/comments" class="nav-link" title="Comments"><i class="bx bx-message-dots"></i> <span data-i18n="admin.nav.comments">Comments</span></a>
            <a href="/admin/contacts" class="nav-link" title="Contacts"><i class="bx bx-envelope"></i> <span data-i18n="admin.nav.contacts">Contacts</span></a>
            <a href="/admin/posts" class="nav-link" title="Blog Posts"><i class="bx bx-book-content"></i> <span data-i18n="admin.nav.posts">Blog Posts</span></a>
            <a href="/admin/upcoming" class="nav-link" title="Upcoming"><i class="bx bx-rocket"></i> <span data-i18n="admin.nav.upcoming">Upcoming</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" target="_blank" class="nav-link" title="View Site"><i class="bx bx-arrow-out-up-left-stroke-square"></i> <span data-i18n="admin.nav.view_site">View Site</span></a>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="admin-main">
        <nav class="admin-topbar d-flex justify-content-between align-items-center px-3 py-2">
            <button class="sidebar-toggle-btn" id="sidebar-toggle" title="Toggle sidebar">
                <i class="bx bx-menu"></i>
            </button>
            <div class="ms-auto d-flex align-items-center gap-3">
                <button class="btn btn-sm btn-outline-secondary rounded-circle" id="adminThemeToggle" title="Toggle theme" style="width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;">
                    <i class="bxf bx-sun"></i>
                </button>
                <div class="dropdown">
                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown" id="adminLangLabel">EN</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        {{range .SupportedLangs}}
                        <li><a class="dropdown-item admin-lang-option" href="#" data-lang="{{.}}" data-i18n="lang.{{.}}">{{upper .}}</a></li>
                        {{end}}
                    </ul>
                </div>
                <span class="text-muted small"><i class="bx bx-user"></i> {{if .Admin}}{{.Admin.Username}}{{else}}Admin{{end}}</span>
                <form action="/admin/logout" method="POST" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bx bx-log-out"></i> <span data-i18n="admin.logout">Logout</span></button>
                </form>
            </div>
        </nav>

        <main class="admin-content p-4">
            {{embed}}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="/static/js/toast.js"></script>

    <script src="/static/js/admin.js"></script>
</body>
</html>
