<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-briefcase-fill"></i> Portfolio Admin
        </div>
        <nav class="sidebar-nav">
            <a href="/admin" class="sidebar-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/admin/owner" class="sidebar-link"><i class="bi bi-person-circle"></i> Owner Profile</a>
            <a href="/admin/projects" class="sidebar-link"><i class="bi bi-folder2-open"></i> Projects</a>
            <a href="/admin/experience" class="sidebar-link"><i class="bi bi-clock-history"></i> Experience</a>
            <a href="/admin/skills" class="sidebar-link"><i class="bi bi-stars"></i> Skills</a>
            <a href="/admin/social-links" class="sidebar-link"><i class="bi bi-share-fill"></i> Social Links</a>
            <a href="/admin/uploads" class="sidebar-link"><i class="bi bi-cloud-upload"></i> Uploads</a>
            <a href="/admin/comments" class="sidebar-link"><i class="bi bi-chat-dots"></i> Comments</a>
            <a href="/admin/contacts" class="sidebar-link"><i class="bi bi-envelope"></i> Contacts</a>
            <a href="/admin/posts" class="sidebar-link"><i class="bi bi-journal-text"></i> Blog Posts</a>
            <a href="/admin/upcoming" class="sidebar-link"><i class="bi bi-rocket-takeoff"></i> Upcoming</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" target="_blank" class="sidebar-link"><i class="bi bi-box-arrow-up-right"></i> View Site</a>
        </div>
    </aside>

    <div class="admin-main">
        <nav class="admin-topbar d-flex justify-content-between align-items-center px-4 py-2">
            <button class="btn btn-sm btn-outline-secondary d-lg-none" id="sidebar-toggle">
                <i class="bi bi-list"></i>
            </button>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-muted small"><i class="bi bi-person"></i> Admin</span>
                <form action="/admin/logout" method="POST" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
                </form>
            </div>
        </nav>

        <main class="admin-content p-4">
            {{embed}}
        </main>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
