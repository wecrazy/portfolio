<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-default-lang="{{.DefaultLang}}" data-app-version="{{appVersion}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} | Portfolio</title>
    <meta name="description" content="Professional portfolio and resume">

    <!-- Prevent flash of wrong theme / language; preload translation JSON early -->
    <script>
    (function(){
        var t=localStorage.getItem('portfolio-theme');
        if(t)document.documentElement.setAttribute('data-bs-theme',t);
        var l=localStorage.getItem('portfolio-lang');
        if(l){
            document.documentElement.setAttribute('lang',l);
            var link=document.createElement('link');
            link.rel='preload';
            link.as='fetch';
            link.crossOrigin='anonymous';
            var v=document.documentElement.getAttribute('data-app-version')||'';
            link.href='/static/lang/'+l+'.json'+(v?'?v='+v:'');
            document.head.appendChild(link);
        }
    })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Font Awesome 6.4 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <!-- AOS 2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Portfolio CSS -->
    <link href="/static/css/portfolio.css" rel="stylesheet">
</head>
<body>
    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scrollProgress"></div>

    {{embed}}

    <!-- AOS 2.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- HTMX 1.9.10 -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Portfolio JS -->
    <script src="/static/js/portfolio.js"></script>
</body>
</html>
