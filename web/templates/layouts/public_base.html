<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-default-lang="{{.DefaultLang}}" data-content-lang="en" data-app-version="{{appVersion}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} | Portfolio</title>
    <meta name="description" content="{{if .OGDescription}}{{.OGDescription}}{{else}}Professional portfolio and resume.{{end}}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="manifest" href="/static/img/site.webmanifest">
    <meta name="theme-color" content="#6c63ff">

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Telegram, Discord, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{.Owner.FullName}}">
    <meta property="og:title" content="{{.Title}}">
    <meta property="og:description" content="{{if .OGDescription}}{{.OGDescription}}{{else}}Professional portfolio and resume.{{end}}">
    <meta property="og:url" content="{{.BaseURL}}">
    {{if .OGImage}}<meta property="og:image" content="{{.OGImage}}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">{{end}}

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{.Title}}">
    <meta name="twitter:description" content="{{if .OGDescription}}{{.OGDescription}}{{else}}Professional portfolio and resume.{{end}}">
    {{if .OGImage}}<meta name="twitter:image" content="{{.OGImage}}">{{end}}

    <!-- Prevent flash of wrong theme / language; preload translation JSON early -->
    <script>
    (function(){
        var t=localStorage.getItem('portfolio-theme');
        if(t)document.documentElement.setAttribute('data-bs-theme',t);
        var l=localStorage.getItem('portfolio-lang');
        if(l){
            document.documentElement.setAttribute('lang',l);
            var link=document.createElement('link');
            link.rel='preload';
            link.as='fetch';
            link.crossOrigin='anonymous';
            var v=document.documentElement.getAttribute('data-app-version')||'';
            link.href='/lang/'+l+(v?'?v='+v:'');
            document.head.appendChild(link);
        }
    })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">

    <!-- Font Awesome 6.4 -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">

    <!-- AOS 2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Portfolio CSS (cache-busted by app version) -->
    <link href="/static/css/portfolio.css?v={{appVersion}}" rel="stylesheet">
</head>
<body>
    <div class="bg-noise"></div>
    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scrollProgress"></div>

    {{embed}}

    <!-- AOS 2.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- PDF.js for in-browser PDF rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
    <!-- HTMX 2.0.8 -->
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>

    <!-- Portfolio JS (cache-busted by version) -->
    <script src="/static/js/portfolio.js?v={{appVersion}}"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="/static/js/toast.js?v={{appVersion}}"></script>

    <!-- hCaptcha JS: only loaded when hcaptcha is enabled in config -->
    {{if .HCaptchaEnabled}}
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    {{end}}

    <!-- contactToast: triggered by HX-Trigger header from POST /contact -->
    <script>
    document.addEventListener('contactToast', function (e) {
        showToast(e.detail.msg, e.detail.type || 'success');
    });
    </script>

    <!-- WebSocket: real-time comment updates + shutdown notifications -->
    <script src="/static/js/events.js?v={{appVersion}}"></script>
</body>
</html>
