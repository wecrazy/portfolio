<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold" data-i18n="admin.social.title">Social Links</h2>
    <button class="btn btn-primary" hx-get="/admin/social-links/new" hx-target="#form-container" hx-swap="innerHTML">
        <i class="bx bx-plus"></i> <span data-i18n="admin.social.new">New Social Link</span>
    </button>
</div>

<div id="form-container" class="mb-4"></div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
        <select id="social-per-page" class="form-select form-select-sm" style="width: auto;" onchange="reloadList('social')">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
        <span class="text-muted small" data-i18n="admin.table.per_page">per page</span>
    </div>
    <div>
        <input type="text" id="social-search" class="form-control form-control-sm" data-i18n-placeholder="admin.table.search" placeholder="Search..." oninput="debounceReloadList('social')">
    </div>
</div>

<div class="card border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th onclick="sortList('social','platform')" style="cursor:pointer"><span data-i18n="admin.col.platform">Platform</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th onclick="sortList('social','label')" style="cursor:pointer"><span data-i18n="admin.col.label">Label</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th><span data-i18n="admin.col.url">URL</span></th>
                    <th onclick="sortList('social','sort_order')" style="cursor:pointer"><span data-i18n="admin.col.order">Order</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th><span data-i18n="admin.col.actions">Actions</span></th>
                </tr>
            </thead>
            <tbody id="social-list" data-list-url="/admin/social-links/list" hx-get="/admin/social-links/list" hx-trigger="load" hx-swap="innerHTML">
            </tbody>
        </table>
    </div>
</div>
