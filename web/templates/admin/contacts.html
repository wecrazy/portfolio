<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold" data-i18n="admin.contacts.title">Contact Messages</h2>
</div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
        <select id="contacts-per-page" class="form-select form-select-sm" style="width: auto;" onchange="reloadList('contacts')">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
        <span class="text-muted small" data-i18n="admin.table.per_page">per page</span>
    </div>
    <div>
        <input type="text" id="contacts-search" class="form-control form-control-sm" data-i18n-placeholder="admin.table.search" placeholder="Search..." oninput="debounceReloadList('contacts')">
    </div>
</div>

<div class="card border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th onclick="sortList('contacts','name')" style="cursor:pointer"><span data-i18n="admin.col.name">Name</span> <i class="bi bi-arrow-down-up text-muted small"></i></th>
                    <th onclick="sortList('contacts','email')" style="cursor:pointer"><span data-i18n="admin.col.email">Email</span> <i class="bi bi-arrow-down-up text-muted small"></i></th>
                    <th onclick="sortList('contacts','subject')" style="cursor:pointer"><span data-i18n="admin.col.subject">Subject</span> <i class="bi bi-arrow-down-up text-muted small"></i></th>
                    <th onclick="sortList('contacts','created_at')" style="cursor:pointer"><span data-i18n="admin.col.date">Date</span> <i class="bi bi-arrow-down-up text-muted small"></i></th>
                    <th><span data-i18n="admin.col.status">Status</span></th>
                    <th><span data-i18n="admin.col.actions">Actions</span></th>
                </tr>
            </thead>
            <tbody id="contacts-list" data-list-url="/admin/contacts/list" hx-get="/admin/contacts/list" hx-trigger="load" hx-swap="innerHTML">
            </tbody>
        </table>
    </div>
</div>
