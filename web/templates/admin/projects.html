<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold" data-i18n="admin.projects.title">Projects</h2>
    <button class="btn btn-primary" hx-get="/admin/projects/new" hx-target="#form-container" hx-swap="innerHTML">
        <i class="bi bi-plus-lg"></i> <span data-i18n="admin.projects.new">New Project</span>
    </button>
</div>

<div id="form-container" class="mb-4"></div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
        <select id="projects-per-page" class="form-select form-select-sm" style="width: auto;" onchange="reloadList('projects')">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
        <span class="text-muted small" data-i18n="admin.table.per_page">per page</span>
    </div>
    <div>
        <input type="text" id="projects-search" class="form-control form-control-sm" data-i18n-placeholder="admin.table.search" placeholder="Search..." oninput="debounceReloadList('projects')">
    </div>
</div>

<div class="card border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th onclick="sortList('projects','title')" style="cursor:pointer"><span data-i18n="admin.col.title">Title</span> <i class="bi bi-arrow-down-up text-muted small"></i></th>
                    <th onclick="sortList('projects','status')" style="cursor:pointer"><span data-i18n="admin.col.status">Status</span> <i class="bi bi-arrow-down-up text-muted small"></i></th>
                    <th><span data-i18n="admin.col.featured">Featured</span></th>
                    <th onclick="sortList('projects','sort_order')" style="cursor:pointer"><span data-i18n="admin.col.order">Order</span> <i class="bi bi-arrow-down-up text-muted small"></i></th>
                    <th><span data-i18n="admin.col.actions">Actions</span></th>
                </tr>
            </thead>
            <tbody id="projects-list" data-list-url="/admin/projects/list" hx-get="/admin/projects/list" hx-trigger="load" hx-swap="innerHTML">
            </tbody>
        </table>
    </div>
</div>
