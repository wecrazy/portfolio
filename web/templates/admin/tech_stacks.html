<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 data-i18n="admin.techstack.title">Tech Stack</h2>
    <button class="btn btn-primary" hx-get="/admin/tech-stacks/new" hx-target="#form-container" hx-swap="innerHTML">
        <i class="bx bx-plus me-1"></i><span data-i18n="admin.techstack.new">Add Entry</span>
    </button>
</div>

<div id="form-container" class="mb-4"></div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
        <select id="techstacks-per-page" class="form-select form-select-sm" style="width: auto;" onchange="reloadList('techstacks')">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
        <span class="text-muted small" data-i18n="admin.table.per_page">per page</span>
    </div>
    <div>
        <input type="text" id="techstacks-search" class="form-control form-control-sm" data-i18n-placeholder="admin.table.search" placeholder="Search..." oninput="debounceReloadList('techstacks')">
    </div>
</div>

<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th><span data-i18n="admin.col.icon">Icon</span></th>
                <th onclick="sortList('techstacks','name')" style="cursor:pointer"><span data-i18n="admin.col.name">Name</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                <th onclick="sortList('techstacks','category')" style="cursor:pointer"><span data-i18n="admin.col.category">Category</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                <th><span data-i18n="admin.col.description">Description</span></th>
                <th onclick="sortList('techstacks','sort_order')" style="cursor:pointer"><span data-i18n="admin.col.order">Order</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                <th><span data-i18n="admin.col.actions">Actions</span></th>
            </tr>
        </thead>
        <tbody id="techstacks-list" data-list-url="/admin/tech-stacks/list" hx-get="/admin/tech-stacks/list" hx-trigger="load" hx-swap="innerHTML">
            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr>
        </tbody>
    </table>
</div>
