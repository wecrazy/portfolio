<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Tech Stack</h2>
    <button class="btn btn-primary" hx-get="/admin/tech-stacks/new" hx-target="#form-container" hx-swap="innerHTML">
        <i class="bi bi-plus-lg me-1"></i>Add Entry
    </button>
</div>

<div id="form-container" class="mb-4"></div>

<div class="table-responsive">
    <table class="table table-hover align-middle">
        <thead>
            <tr>
                <th>Icon</th>
                <th>Name</th>
                <th>Category</th>
                <th>Description</th>
                <th>Order</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="data-rows" hx-get="/admin/tech-stacks/list" hx-trigger="load" hx-swap="innerHTML">
            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr>
        </tbody>
    </table>
</div>
