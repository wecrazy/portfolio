<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold" data-i18n="admin.dashboard.title">Dashboard</h2>
    <span class="text-muted small" data-i18n="admin.welcome">Welcome back!</span>
</div>

<div class="row g-4 mb-4">
    <div class="col-md-3 col-sm-6">
        <div class="card stat-card border-0 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-primary bg-opacity-10 text-primary rounded-3 p-3">
                    <i class="bx bx-folder-open fs-4"></i>
                </div>
                <div>
                    <div class="stat-value fs-3 fw-bold">{{.ProjectCount}}</div>
                    <div class="text-muted small" data-i18n="admin.dashboard.projects">Projects</div>
                </div>
            </div>
            <a href="/admin/projects" class="card-footer text-decoration-none text-muted small d-flex justify-content-between align-items-center">
                <span data-i18n="admin.dashboard.manage">Manage</span> <i class="bx bx-arrow-right"></i>
            </a>
        </div>
    </div>
    <div class="col-md-3 col-sm-6">
        <div class="card stat-card border-0 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-success bg-opacity-10 text-success rounded-3 p-3">
                    <i class="bx bx-message-dots fs-4"></i>
                </div>
                <div>
                    <div class="stat-value fs-3 fw-bold">{{.CommentCount}}</div>
                    <div class="text-muted small" data-i18n="admin.dashboard.comments">Comments</div>
                </div>
            </div>
            <a href="/admin/comments" class="card-footer text-decoration-none text-muted small d-flex justify-content-between align-items-center">
                <span data-i18n="admin.dashboard.moderate">Moderate</span> <i class="bx bx-arrow-right"></i>
            </a>
        </div>
    </div>
    <div class="col-md-3 col-sm-6">
        <div class="card stat-card border-0 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-warning bg-opacity-10 text-warning rounded-3 p-3">
                    <i class="bx bx-envelope fs-4"></i>
                </div>
                <div>
                    <div class="stat-value fs-3 fw-bold">{{.ContactCount}}</div>
                    <div class="text-muted small" data-i18n="admin.dashboard.messages">Messages</div>
                </div>
            </div>
            <a href="/admin/contacts" class="card-footer text-decoration-none text-muted small d-flex justify-content-between align-items-center">
                <span data-i18n="admin.dashboard.view">View</span> <i class="bx bx-arrow-right"></i>
            </a>
        </div>
    </div>
    <div class="col-md-3 col-sm-6">
        <div class="card stat-card border-0 h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-danger bg-opacity-10 text-danger rounded-3 p-3">
                    <i class="bxf bx-envelope fs-4"></i>
                </div>
                <div>
                    <div class="stat-value fs-3 fw-bold">{{.UnreadCount}}</div>
                    <div class="text-muted small" data-i18n="admin.dashboard.unread">Unread</div>
                </div>
            </div>
            <a href="/admin/contacts" class="card-footer text-decoration-none text-muted small d-flex justify-content-between align-items-center">
                <span data-i18n="admin.dashboard.read">Read</span> <i class="bx bx-arrow-right"></i>
            </a>
        </div>
    </div>
</div>
