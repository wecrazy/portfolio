<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold" data-i18n="admin.owner.title">Owner Profile</h2>
</div>

<div class="row g-4">
    <div class="col-lg-4">
        <div class="card border-0 mb-3">
            <div class="card-body text-center">
                <h6 class="card-title mb-3">Profile Image</h6>
                <div id="image-preview" class="mb-3">
                    {{if .Owner.ProfileImage}}
                    <img src="/uploads/images/{{.Owner.ProfileImage.StoredName}}" class="img-fluid rounded" alt="Profile" style="max-height: 200px;">
                    {{else}}
                    <div class="bg-secondary bg-opacity-25 rounded d-flex align-items-center justify-content-center" style="height: 200px;">
                        <i class="bx bx-user fs-1 text-muted"></i>
                    </div>
                    {{end}}
                </div>
                <form hx-post="/admin/owner/upload-image" hx-target="#image-preview" hx-encoding="multipart/form-data">
                    <input type="file" name="image" class="form-control form-control-sm mb-2" accept="image/*" required>
                    <button type="submit" class="btn btn-sm btn-outline-primary w-100"><i class="bx bx-upload"></i> <span data-i18n="admin.action.upload">Upload</span></button>
                </form>
            </div>
        </div>
        <div class="card border-0">
            <div class="card-body text-center">
                <h6 class="card-title mb-3">Resume PDF</h6>
                <div id="resume-preview" class="mb-3">
                    {{if .Owner.ResumeFile}}
                    <a href="/resume" target="_blank" class="btn btn-sm btn-outline-primary">
                        <i class="bx bx-file"></i> {{.Owner.ResumeFile.OriginalName}}
                    </a>
                    {{else}}
                    <span class="text-muted small">No resume uploaded</span>
                    {{end}}
                </div>
                <form hx-post="/admin/owner/upload-resume" hx-target="#resume-preview" hx-encoding="multipart/form-data">
                    <input type="file" name="resume" class="form-control form-control-sm mb-2" accept=".pdf" required>
                    <button type="submit" class="btn btn-sm btn-outline-primary w-100"><i class="bx bx-upload"></i> <span data-i18n="admin.action.upload">Upload</span></button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="card border-0">
            <div class="card-body">
                <form hx-put="/admin/owner" hx-target="body" hx-swap="innerHTML">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{.Owner.FullName}}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Title / Role</label>
                        <input type="text" name="title" class="form-control" value="{{.Owner.Title}}" placeholder="e.g. Full-Stack Developer">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tagline <small class="text-muted">(short motivational line shown in the hero)</small></label>
                        <input type="text" name="tagline" class="form-control" value="{{.Owner.Tagline}}" placeholder="e.g. Turning ideas into reliable software — one commit at a time.">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio <small class="text-muted">(shown in the About section)</small></label>
                        <textarea name="bio" class="form-control" rows="5">{{.Owner.Bio}}</textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{.Owner.Email}}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control" value="{{.Owner.Phone}}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" value="{{.Owner.Location}}" placeholder="e.g. Jakarta, Indonesia">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bx bx-check"></i> <span data-i18n="admin.action.save">Save</span></button>
                </form>
            </div>
        </div>
    </div>
</div>
