<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Experience</h2>
    <button class="btn btn-primary" hx-get="/admin/experience/new" hx-target="#form-container" hx-swap="innerHTML">
        <i class="bi bi-plus-lg"></i> New Experience
    </button>
</div>

<div id="form-container" class="mb-4"></div>

<div class="card border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Organization</th>
                    <th>Type</th>
                    <th>Start</th>
                    <th>Current</th>
                    <th>Order</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="experience-list" hx-get="/admin/experience/list" hx-trigger="load" hx-swap="innerHTML">
            </tbody>
        </table>
    </div>
</div>
