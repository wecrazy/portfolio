<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold" data-i18n="admin.experience.title">Experience</h2>
    <button class="btn btn-primary" hx-get="/admin/experience/new" hx-target="#form-container" hx-swap="innerHTML">
        <i class="bx bx-plus"></i> <span data-i18n="admin.experience.new">New Experience</span>
    </button>
</div>

<div id="form-container" class="mb-4"></div>

<div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-2">
        <select id="experience-per-page" class="form-select form-select-sm" style="width: auto;" onchange="reloadList('experience')">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
        <span class="text-muted small" data-i18n="admin.table.per_page">per page</span>
    </div>
    <div>
        <input type="text" id="experience-search" class="form-control form-control-sm" data-i18n-placeholder="admin.table.search" placeholder="Search..." oninput="debounceReloadList('experience')">
    </div>
</div>

<div class="card border-0">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th onclick="sortList('experience','title')" style="cursor:pointer"><span data-i18n="admin.col.title">Title</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th onclick="sortList('experience','org')" style="cursor:pointer"><span data-i18n="admin.col.organization">Organization</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th onclick="sortList('experience','type')" style="cursor:pointer"><span data-i18n="admin.col.type">Type</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th onclick="sortList('experience','start_date')" style="cursor:pointer"><span data-i18n="admin.col.start">Start</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th><span data-i18n="admin.col.current">Current</span></th>
                    <th onclick="sortList('experience','sort_order')" style="cursor:pointer"><span data-i18n="admin.col.order">Order</span> <i class="bx bx-sort-alt-2 text-muted small"></i></th>
                    <th><span data-i18n="admin.col.image">Image</span></th>
                    <th><span data-i18n="admin.col.actions">Actions</span></th>
                </tr>
            </thead>
            <tbody id="experience-list" data-list-url="/admin/experience/list" hx-get="/admin/experience/list" hx-trigger="load" hx-swap="innerHTML">
            </tbody>
        </table>
    </div>
</div>
