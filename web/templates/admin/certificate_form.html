<div class="card border-0 mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">{{if .Certificate.ID}}Edit Certificate{{else}}New Certificate{{end}}</h6>
        <form {{if .Certificate.ID}}hx-put="/admin/certificates/{{.Certificate.ID}}" hx-target="#cert-{{.Certificate.ID}}" hx-swap="outerHTML"{{else}}hx-post="/admin/certificates" hx-target="#certificates-list" hx-swap="beforeend"{{end}} enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-8 mb-2">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" value="{{.Certificate.Title}}" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Issuer</label>
                    <input type="text" name="issuer" class="form-control" value="{{.Certificate.Issuer}}">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Issue Date</label>
                    <input type="date" name="issue_date" class="form-control" value="{{formatDateInput .Certificate.IssueDate}}">
                </div>
                <div class="col-md-8 mb-2">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="2">{{.Certificate.Description}}</textarea>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Certificate URL</label>
                    <input type="url" name="cert_url" class="form-control" value="{{.Certificate.CertURL}}">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Upload File (Image/PDF)</label>
                    <input type="file" name="file" class="form-control">
                    {{if .Certificate.File}}
                    <div class="mt-2">
                        <a href="/uploads/{{.Certificate.File.StoredName}}" target="_blank">Current File</a>
                    </div>
                    {{end}}
                </div>
                <div class="col-12 mb-2 d-flex align-items-center">
                    <div class="form-check">
                        <input type="checkbox" name="is_visible" class="form-check-input" id="is_visible" {{if .Certificate.IsVisible}}checked{{end}}>
                        <label class="form-check-label" for="is_visible">Visible</label>
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success"><i class="bx bx-check"></i> Save</button>
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.card').remove()">Cancel</button>
                </div>
            </div>
        </form>
    </div>
</div>
