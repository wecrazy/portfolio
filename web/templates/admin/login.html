<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-app-version="{{.AppVersion}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Portfolio</title>
    {{if .HCaptchaEnable}}
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    {{end}}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (function(){
        var t = localStorage.getItem('admin-theme');
        if (t) document.documentElement.setAttribute('data-bs-theme', t);
    })();
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            background: linear-gradient(135deg, #6c63ff, #00d4aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-login {
            background: linear-gradient(135deg, #6c63ff, #00d4aa);
            border: none;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 50px;
        }
        .btn-login:hover { opacity: 0.9; color: white; }
        .form-control { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: #fff; }
        .form-control:focus { background: rgba(255,255,255,0.12); color: #fff; border-color: #6c63ff; box-shadow: 0 0 0 0.2rem rgba(108,99,255,0.25); }
        /* Light theme overrides */
        [data-bs-theme="light"] body {
            background: linear-gradient(135deg, #f5f5fa 0%, #ece8f5 50%, #f5f5fa 100%);
        }
        [data-bs-theme="light"] .login-card {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.08);
        }
        [data-bs-theme="light"] .form-control {
            background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.1); color: #1a1a2e;
        }
        [data-bs-theme="light"] .form-control:focus {
            background: rgba(255,255,255,0.8); color: #1a1a2e;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="/static/js/toast.js?v={{.AppVersion}}"></script>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="mb-4 fw-bold" data-i18n="admin.login.title">Admin Login</h2>
        {{if .Error}}
        <div class="alert alert-danger alert-sm py-2">{{.Error}}</div>
        {{end}}
        <form action="/admin/login" method="POST">
            <div class="mb-3 text-start">
                <label for="email" class="form-label text-muted small" data-i18n="admin.login.email">Email</label>
                <input type="email" class="form-control" id="email" name="email" required autofocus>
            </div>
            <div class="mb-4 text-start">
                <label for="password" class="form-label text-muted small" data-i18n="admin.login.password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-login w-100" data-i18n="admin.login.submit">Sign In</button>
            {{if .HCaptchaEnable}}
            <div class="mt-3" style="display:flex;justify-content:center">
                <div class="h-captcha" data-sitekey="{{.HCaptchaKey}}"></div>
            </div>
            {{end}}
        </form>
        <a href="/" class="d-block mt-3 text-muted small text-decoration-none" data-i18n="admin.login.back">&larr; Back to portfolio</a>
    </div>
    <script>
    (function () {
        // Show toast from URL query param (e.g. after logout redirect)
        var params = new URLSearchParams(window.location.search);
        var toastKey = params.get('toast');
        if (toastKey) {
            var messages = {
                'logout_success': 'You have been logged out.',
                'login_success': 'Welcome back!'
            };
            var msg = messages[toastKey] || toastKey;
            window.showToast(msg, 'success');
            var url = new URL(window.location);
            url.searchParams.delete('toast');
            window.history.replaceState({}, '', url.pathname + url.search);
        }

        // Minimal i18n for login page
        var lang = localStorage.getItem('admin-lang') || 'en';
        if (lang !== 'en') {
            fetch('/lang/' + lang)
                .then(function (r) { return r.json(); })
                .then(function (dict) {
                    document.querySelectorAll('[data-i18n]').forEach(function (el) {
                        var key = el.getAttribute('data-i18n');
                        if (dict[key]) el.textContent = dict[key];
                    });
                })
                .catch(function () {});
        }
    })();
    </script>
</body>
</html>
