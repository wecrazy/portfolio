<!-- EasyMDE (Markdown editor) — load only when form is injected -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>

<div class="card border-0 mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">{{if .Post.ID}}Edit Post{{else}}New Post{{end}}</h6>
        <form {{if .Post.ID}}hx-put="/admin/posts/{{.Post.ID}}" hx-target="#post-{{.Post.ID}}" hx-swap="outerHTML"{{else}}hx-post="/admin/posts" hx-target="#posts-list" hx-swap="beforeend"{{end}}>
            <div class="row g-3">
                <div class="col-md-8 mb-2">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" value="{{.Post.Title}}" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="draft" {{if eq .Post.Status "draft"}}selected{{end}}>Draft</option>
                        <option value="published" {{if eq .Post.Status "published"}}selected{{end}}>Published</option>
                    </select>
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">Excerpt <small class="text-muted">(short preview shown in the blog list)</small></label>
                    <textarea name="excerpt" class="form-control" rows="2">{{.Post.Excerpt}}</textarea>
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">
                        Content
                        <small class="text-muted">(Markdown supported — use toolbar to insert images, video &amp; audio)</small>
                    </label>
                    <!-- Media upload buttons -->
                    <div class="d-flex gap-2 mb-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="postMediaUpload('image')">
                            <i class="bx bx-image-add me-1"></i>Insert Image
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="postMediaUpload('video')">
                            <i class="bx bx-video-plus me-1"></i>Insert Video
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="postMediaUpload('audio')">
                            <i class="bx bx-music me-1"></i>Insert Audio
                        </button>
                        <span class="ms-auto text-muted small align-self-center">
                            YouTube embed: paste <code>&lt;iframe src="https://www.youtube.com/embed/ID" ...&gt;&lt;/iframe&gt;</code>
                        </span>
                    </div>
                    <textarea id="post-content-mde" name="content" class="form-control" rows="12">{{.Post.Content}}</textarea>
                </div>
                <div class="col-md-8 mb-2">
                    <label class="form-label">Tags <small class="text-muted">(comma-separated)</small></label>
                    <input type="text" name="tags" class="form-control" value="{{.Post.Tags}}" placeholder="Go, Tutorial, Backend">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Sort Order</label>
                    <input type="number" name="sort_order" class="form-control" value="{{.Post.SortOrder}}">
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">Thumbnail</label>
                    <div id="thumbnail-preview" class="mb-2">
                        {{if .Post.ThumbnailFile}}
                        <img src="/uploads/images/{{.Post.ThumbnailFile.StoredName}}" class="img-thumbnail" style="max-height:120px" alt="Thumbnail">
                        {{end}}
                    </div>
                    <input type="hidden" id="thumbnail_file_id" name="thumbnail_file_id" value="{{if .Post.ThumbnailFileID}}{{.Post.ThumbnailFileID}}{{end}}">
                    <form hx-post="/admin/posts/upload-thumbnail"
                          hx-target="#thumbnail-preview"
                          hx-swap="innerHTML"
                          hx-encoding="multipart/form-data">
                        <div class="d-flex align-items-center gap-2">
                            <input type="file" name="thumbnail" class="form-control form-control-sm"
                                   accept="image/jpeg,image/png,image/webp"
                                   onchange="this.closest('form').requestSubmit()">
                            <small class="text-muted text-nowrap">JPEG/PNG/WebP, max 5MB</small>
                        </div>
                    </form>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-success"><i class="bx bx-check"></i> Save</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.card').remove()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
(function () {
    // Initialise EasyMDE on the content textarea.
    var ta = document.getElementById('post-content-mde');
    if (!ta || ta._mdeReady) return;
    ta._mdeReady = true;

    window._postMDE = new EasyMDE({
        element: ta,
        spellChecker: false,
        autofocus: false,
        lineWrapping: true,
        status: ['lines', 'words', 'cursor'],
        toolbar: [
            'bold', 'italic', 'strikethrough', 'heading', '|',
            'quote', 'code', 'unordered-list', 'ordered-list', '|',
            'link', 'horizontal-rule', '|',
            'preview', 'side-by-side', 'fullscreen', '|',
            'guide'
        ],
    });

    // Media upload helper — called by the three buttons above the editor.
    window.postMediaUpload = function (type) {
        var input = document.createElement('input');
        input.type = 'file';
        if (type === 'image')      input.accept = 'image/jpeg,image/png,image/webp,image/gif';
        else if (type === 'video') input.accept = 'video/mp4,video/webm,video/ogg';
        else if (type === 'audio') input.accept = 'audio/mpeg,audio/ogg,audio/wav,audio/aac,audio/flac';

        input.onchange = function () {
            var file = input.files[0];
            if (!file) return;
            var endpoint = '/admin/posts/upload-' + (type === 'image' ? 'media' : type);
            var fd = new FormData();
            fd.append('file', file);

            fetch(endpoint, { method: 'POST', body: fd })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.error) { alert('Upload failed: ' + data.error); return; }
                    var snippet = '';
                    if (type === 'image') {
                        snippet = '![' + file.name + '](' + data.url + ')';
                    } else if (type === 'video') {
                        snippet = '<video controls style="max-width:100%;border-radius:8px">\n' +
                                  '  <source src="' + data.url + '" type="' + file.type + '">\n' +
                                  '</video>';
                    } else if (type === 'audio') {
                        snippet = '<audio controls style="width:100%">\n' +
                                  '  <source src="' + data.url + '" type="' + file.type + '">\n' +
                                  '</audio>';
                    }
                    var cm = window._postMDE.codemirror;
                    var cursor = cm.getCursor();
                    cm.replaceRange('\n' + snippet + '\n', cursor);
                    cm.focus();
                })
                .catch(function (err) { alert('Upload error: ' + err); });
        };
        input.click();
    };
})();
</script>
