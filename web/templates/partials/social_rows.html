{{range .SocialLinks}}
<tr id="social-{{.ID}}">
    <td><i class="{{.IconClass}} me-1"></i> {{.Platform}}</td>
    <td>{{.Label}}</td>
    <td><a href="{{.URL}}" target="_blank" class="text-truncate d-inline-block" style="max-width: 250px;">{{.URL}}</a></td>
    <td>{{.SortOrder}}</td>
    <td>
        <button class="btn btn-sm btn-outline-primary" hx-get="/admin/social-links/{{.ID}}/edit" hx-target="#form-container" hx-swap="innerHTML"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" hx-delete="/admin/social-links/{{.ID}}" hx-target="#social-{{.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete this link?"><i class="bi bi-trash"></i></button>
    </td>
</tr>
{{end}}
