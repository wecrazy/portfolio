{{range .Projects}}
<tr id="project-{{.ID}}">
    <td>{{.Title}}</td>
    <td>
        {{if eq .Status "published"}}<span class="badge bg-success">Published</span>
        {{else}}<span class="badge bg-secondary">Draft</span>{{end}}
    </td>
    <td>{{if .Featured}}<i class="bi bi-star-fill text-warning"></i>{{end}}</td>
    <td>{{.SortOrder}}</td>
    <td>
        <button class="btn btn-sm btn-outline-primary" hx-get="/admin/projects/{{.ID}}/edit" hx-target="#form-container" hx-swap="innerHTML"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" hx-delete="/admin/projects/{{.ID}}" hx-target="#project-{{.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete this project?"><i class="bi bi-trash"></i></button>
    </td>
</tr>
{{end}}
