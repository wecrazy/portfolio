{{range .Posts}}
<tr id="post-{{.ID}}">
    <td>{{.Title}}</td>
    <td>
        {{if eq .Status "published"}}<span class="badge bg-success">Published</span>
        {{else}}<span class="badge bg-secondary">Draft</span>{{end}}
    </td>
    <td><small class="text-muted">{{.Tags}}</small></td>
    <td>{{.SortOrder}}</td>
    <td>
        {{if .PublishedAt}}
        <small class="text-muted">{{formatDate (derefTime .PublishedAt)}}</small>
        {{else}}&mdash;{{end}}
    </td>
    <td>
        <button class="btn btn-sm btn-outline-primary" hx-get="/admin/posts/{{.ID}}/edit" hx-target="#form-container" hx-swap="innerHTML"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" hx-delete="/admin/posts/{{.ID}}" hx-target="#post-{{.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete this post?"><i class="bi bi-trash"></i></button>
    </td>
</tr>
{{end}}
