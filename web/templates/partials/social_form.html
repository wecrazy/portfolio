<div class="card border-0 mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">{{if .Social.ID}}Edit Social Link{{else}}New Social Link{{end}}</h6>
        <form {{if .Social.ID}}hx-put="/admin/social-links/{{.Social.ID}}" hx-target="#social-{{.Social.ID}}" hx-swap="outerHTML"{{else}}hx-post="/admin/social-links" hx-target="#social-list" hx-swap="beforeend"{{end}}>
            <div class="row g-3">
                <div class="col-md-4 mb-2">
                    <label class="form-label">Platform</label>
                    <select name="platform" class="form-select">
                        <option value="github" {{if eq .Social.Platform "github"}}selected{{end}}>GitHub</option>
                        <option value="linkedin" {{if eq .Social.Platform "linkedin"}}selected{{end}}>LinkedIn</option>
                        <option value="instagram" {{if eq .Social.Platform "instagram"}}selected{{end}}>Instagram</option>
                        <option value="twitter" {{if eq .Social.Platform "twitter"}}selected{{end}}>Twitter / X</option>
                        <option value="youtube" {{if eq .Social.Platform "youtube"}}selected{{end}}>YouTube</option>
                        <option value="website" {{if eq .Social.Platform "website"}}selected{{end}}>Website</option>
                        <option value="other" {{if eq .Social.Platform "other"}}selected{{end}}>Other</option>
                    </select>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Label</label>
                    <input type="text" name="label" class="form-control" value="{{.Social.Label}}" placeholder="Display text">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Icon Class</label>
                    <input type="text" name="icon_class" class="form-control" value="{{.Social.IconClass}}" placeholder="e.g. bi bi-github">
                </div>
                <div class="col-md-8 mb-2">
                    <label class="form-label">URL</label>
                    <input type="url" name="url" class="form-control" value="{{.Social.URL}}" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Sort Order</label>
                    <input type="number" name="sort_order" class="form-control" value="{{.Social.SortOrder}}">
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Save</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.card').remove()">Cancel</button>
            </div>
        </form>
    </div>
</div>
