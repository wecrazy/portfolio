{{define "footer"}}
<footer class="py-4 text-center border-top border-glass">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <p class="mb-0 text-muted small">
                &copy; {{currentYear}} {{.Owner.FullName}}. <span data-i18n="footer.rights">All rights reserved.</span>
            </p>
            {{if .IsPortfolio}}
            <p class="mb-0 text-muted small">
                <span data-i18n="footer.built_with">Built with</span> <i class="bxf bx-heart text-danger"></i> — Go v1.26.0 + Fiber v3.1.0
            </p>
            {{else}}
            <a href="/" class="btn btn-sm btn-outline-light">
                <i class="bx bx-arrow-left me-1"></i><span data-i18n="blog.back_portfolio">Back to Portfolio</span>
            </a>
            {{end}}
            {{if .SocialLinks}}
            <div class="d-flex gap-2">
                {{range .SocialLinks}}
                <a href="{{.URL}}" target="_blank" rel="noopener noreferrer" class="text-muted" title="{{.Platform}}">
                    <i class="{{.IconClass}}"></i>
                </a>
                {{end}}
            </div>
            {{end}}
        </div>
    </div>
</footer>
{{end}}
