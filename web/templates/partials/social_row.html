<tr id="social-{{.Social.ID}}">
    <td><i class="{{.Social.IconClass}} me-1"></i> {{.Social.Platform}}</td>
    <td>{{.Social.Label}}</td>
    <td><a href="{{.Social.URL}}" target="_blank" class="text-truncate d-inline-block" style="max-width: 250px;">{{.Social.URL}}</a></td>
    <td>{{.Social.SortOrder}}</td>
    <td>
        <button class="btn btn-sm btn-outline-primary" hx-get="/admin/social-links/{{.Social.ID}}/edit" hx-target="#form-container" hx-swap="innerHTML"><i class="bx bx-edit"></i></button>
        <button class="btn btn-sm btn-outline-danger" hx-delete="/admin/social-links/{{.Social.ID}}" hx-target="#social-{{.Social.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete?"><i class="bx bx-trash"></i></button>
    </td>
</tr>
