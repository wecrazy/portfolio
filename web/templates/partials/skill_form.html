<div class="card border-0 mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">{{if .Skill.ID}}Edit Skill{{else}}New Skill{{end}}</h6>
        <form {{if .Skill.ID}}hx-put="/admin/skills/{{.Skill.ID}}" hx-target="#skill-{{.Skill.ID}}" hx-swap="outerHTML"{{else}}hx-post="/admin/skills" hx-target="#skills-list" hx-swap="beforeend"{{end}}>
            <div class="row g-3">
                <div class="col-md-4 mb-2">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" value="{{.Skill.Name}}" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Category</label>
                    <input type="text" name="category" class="form-control" value="{{.Skill.Category}}" placeholder="e.g. Backend, Frontend, DevOps">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Icon Class</label>
                    <input type="text" name="icon_class" class="form-control" value="{{.Skill.IconClass}}" placeholder="e.g. bi bi-code-slash">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Icon URL <small class="text-muted">(image)</small></label>
                    <input type="text" name="icon_url" class="form-control" value="{{.Skill.IconURL}}" placeholder="https://cdn.../icon.svg">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Icon URL Dark <small class="text-muted">(dark theme)</small></label>
                    <input type="text" name="icon_url_dark" class="form-control" value="{{.Skill.IconURLDark}}" placeholder="https://cdn.../icon-dark.svg">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Proficiency: <span id="prof-val">{{.Skill.Proficiency}}</span>%</label>
                    <input type="range" name="proficiency" class="form-range" min="0" max="100" value="{{.Skill.Proficiency}}" oninput="document.getElementById('prof-val').textContent=this.value">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Sort Order</label>
                    <input type="number" name="sort_order" class="form-control" value="{{.Skill.SortOrder}}">
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Save</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.card').remove()">Cancel</button>
            </div>
        </form>
    </div>
</div>
