{{range .Skills}}
<tr id="skill-{{.ID}}">
    <td>{{.Name}}</td>
    <td><span class="badge bg-info bg-opacity-25 text-info">{{.Category}}</span></td>
    <td>
        <div class="d-flex align-items-center gap-2">
            <div class="progress flex-grow-1" style="height: 8px;">
                <div class="progress-bar bg-primary" style="width: {{.Proficiency}}%;"></div>
            </div>
            <small class="text-muted">{{.Proficiency}}%</small>
        </div>
    </td>
    <td>{{.SortOrder}}</td>
    <td>
        <button class="btn btn-sm btn-outline-primary" hx-get="/admin/skills/{{.ID}}/edit" hx-target="#form-container" hx-swap="innerHTML"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" hx-delete="/admin/skills/{{.ID}}" hx-target="#skill-{{.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete this skill?"><i class="bi bi-trash"></i></button>
    </td>
</tr>
{{end}}
