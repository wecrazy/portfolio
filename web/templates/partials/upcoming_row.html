<tr id="upcoming-{{.Item.ID}}">
    <td>{{.Item.Title}}</td>
    <td>
        {{if eq .Item.Type "project"}}<span class="badge bg-primary">Future Project</span>
        {{else}}<span class="badge bg-info text-dark">Announcement</span>{{end}}
    </td>
    <td>
        {{if eq .Item.Status "in-progress"}}<span class="badge bg-success">In Progress</span>
        {{else if eq .Item.Status "coming-soon"}}<span class="badge bg-warning text-dark">Coming Soon</span>
        {{else}}<span class="badge bg-secondary">Planned</span>{{end}}
    </td>
    <td>{{if .Item.IsVisible}}<i class="bi bi-eye text-success"></i>{{else}}<i class="bi bi-eye-slash text-muted"></i>{{end}}</td>
    <td>{{.Item.SortOrder}}</td>
    <td>
        <button class="btn btn-sm btn-outline-primary" hx-get="/admin/upcoming/{{.Item.ID}}/edit" hx-target="#form-container" hx-swap="innerHTML"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" hx-delete="/admin/upcoming/{{.Item.ID}}" hx-target="#upcoming-{{.Item.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete this item?"><i class="bi bi-trash"></i></button>
    </td>
</tr>
