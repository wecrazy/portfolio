<div class="card border-0 mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">{{if .Project.ID}}Edit Project{{else}}New Project{{end}}</h6>
        <form {{if .Project.ID}}hx-put="/admin/projects/{{.Project.ID}}" hx-target="#project-{{.Project.ID}}" hx-swap="outerHTML"{{else}}hx-post="/admin/projects" hx-target="#projects-list" hx-swap="beforeend"{{end}}>
            <div class="row g-3">
                <div class="col-md-8 mb-2">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" value="{{.Project.Title}}" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="draft" {{if eq .Project.Status "draft"}}selected{{end}}>Draft</option>
                        <option value="published" {{if eq .Project.Status "published"}}selected{{end}}>Published</option>
                    </select>
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">Short Description</label>
                    <textarea name="description" class="form-control" rows="2">{{.Project.Description}}</textarea>
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">Long Description</label>
                    <textarea name="long_desc" class="form-control" rows="3">{{.Project.LongDesc}}</textarea>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Live URL</label>
                    <input type="url" name="live_url" class="form-control" value="{{.Project.LiveURL}}">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Repo URL</label>
                    <input type="url" name="repo_url" class="form-control" value="{{.Project.RepoURL}}">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Thumbnail URL</label>
                    <input type="text" name="thumbnail_url" class="form-control" value="{{.Project.ThumbnailURL}}">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Tags (comma-separated)</label>
                    <input type="text" name="tags" class="form-control" value="{{.Project.Tags}}" placeholder="Go, Fiber, HTMX">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Sort Order</label>
                    <input type="number" name="sort_order" class="form-control" value="{{.Project.SortOrder}}">
                </div>
                <div class="col-md-4 mb-2 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" name="featured" class="form-check-input" id="featured" {{if .Project.Featured}}checked{{end}}>
                        <label class="form-check-label" for="featured">Featured</label>
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-success"><i class="bx bx-check"></i> Save</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.card').remove()">Cancel</button>
            </div>
        </form>
    </div>
</div>
