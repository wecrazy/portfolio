<tr id="post-{{.Post.ID}}">
    <td>{{.Post.Title}}</td>
    <td>
        {{if eq .Post.Status "published"}}<span class="badge bg-success">Published</span>
        {{else}}<span class="badge bg-secondary">Draft</span>{{end}}
    </td>
    <td><small class="text-muted">{{.Post.Tags}}</small></td>
    <td>{{.Post.SortOrder}}</td>
    <td>
        {{if .Post.PublishedAt}}
        <small class="text-muted">{{formatDate (derefTime .Post.PublishedAt)}}</small>
        {{else}}&mdash;{{end}}
    </td>
    <td>
        <button class="btn btn-sm btn-outline-primary" hx-get="/admin/posts/{{.Post.ID}}/edit" hx-target="#form-container" hx-swap="innerHTML"><i class="bx bx-edit"></i></button>
        <button class="btn btn-sm btn-outline-danger" hx-delete="/admin/posts/{{.Post.ID}}" hx-target="#post-{{.Post.ID}}" hx-swap="outerHTML swap:0.3s" hx-confirm="Delete this post?"><i class="bx bx-trash"></i></button>
    </td>
</tr>
