<div class="card border-0 mb-3">
    <div class="card-body">
        <h6 class="card-title mb-3">{{if .Experience.ID}}Edit Experience{{else}}New Experience{{end}}</h6>
        <form {{if .Experience.ID}}hx-put="/admin/experience/{{.Experience.ID}}" hx-target="#experience-{{.Experience.ID}}" hx-swap="outerHTML"{{else}}hx-post="/admin/experience" hx-target="#experience-list" hx-swap="beforeend"{{end}}>
            <div class="row g-3">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" value="{{.Experience.Title}}" required>
                </div>
                <div class="col-md-3 mb-2">
                    <label class="form-label">Type</label>
                    <select name="type" class="form-select">
                        <option value="work" {{if eq .Experience.Type "work"}}selected{{end}}>Work</option>
                        <option value="education" {{if eq .Experience.Type "education"}}selected{{end}}>Education</option>
                        <option value="certification" {{if eq .Experience.Type "certification"}}selected{{end}}>Certification</option>
                    </select>
                </div>
                <div class="col-md-3 mb-2">
                    <label class="form-label">Sort Order</label>
                    <input type="number" name="sort_order" class="form-control" value="{{.Experience.SortOrder}}">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Organization</label>
                    <input type="text" name="org" class="form-control" value="{{.Experience.Org}}">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" value="{{.Experience.Location}}">
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="start_date" class="form-control" value="{{formatDateInput .Experience.StartDate}}" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" class="form-control" {{if not (isZeroTime (derefTime .Experience.EndDate))}}value="{{formatDateInput (derefTime .Experience.EndDate)}}"{{end}}>
                </div>
                <div class="col-md-4 mb-2 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" name="is_current" class="form-check-input" id="is_current" {{if .Experience.IsCurrent}}checked{{end}}>
                        <label class="form-check-label" for="is_current">Currently here</label>
                    </div>
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3">{{.Experience.Description}}</textarea>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Save</button>
                <button type="button" class="btn btn-secondary" onclick="this.closest('.card').remove()">Cancel</button>
            </div>
        </form>
    </div>
</div>
