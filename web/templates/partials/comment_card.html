<div class="comment-item mb-4">
    <div class="d-flex align-items-start gap-3">
        {{if .Comment.OAuthUser.AvatarURL}}
        <img src="{{.Comment.OAuthUser.AvatarURL}}" class="rounded-circle" width="40" height="40" alt="">
        {{else}}
        <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center" style="width:40px;height:40px;">
            <i class="bi bi-person text-white"></i>
        </div>
        {{end}}
        <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2 mb-1">
                <strong>{{.Comment.OAuthUser.DisplayName}}</strong>
                <span class="badge bg-secondary bg-opacity-50 small">{{.Comment.OAuthUser.Provider}}</span>
                <small class="text-muted">{{formatDateTime .Comment.CreatedAt}}</small>
            </div>
            <p class="mb-0">{{.Comment.Body}}</p>
        </div>
    </div>
</div>
